<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GuideRail - Profile</title>
  <link rel="stylesheet" href="styles/color.css">
  <link rel="stylesheet" href="styles/profile.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title"><span aria-hidden="true">🚉</span> GuideRail</h1>
    <button id="theme-toggle" type="button">Toggle Theme</button>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="profile.html" aria-current="page">Profile</a>
      <a href="settings.html">Settings</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main class="site-main profile-page-main">
    <section class="profile-container" aria-labelledby="profile-heading">
      <h2 id="profile-heading" class="panel-title">Profile Overview</h2>

      <article class="profile-header" aria-label="Steam profile summary">
        <img id="avatar" class="profile-avatar" alt="Steam profile avatar">
        <div class="profile-info">
          <h3 class="username" id="username"></h3>
          <p>Account Created: <span id="created"></span></p>
          <p>Last Online: <span id="lastlogoff"></span></p>
          <p>Steam ID: <span id="steamid"></span></p>
        </div>
      </article>

      <section class="import-panel" aria-labelledby="import-heading">
        <h3 id="import-heading">Library Import</h3>
        <p>Fetch your Steam owned games and store the result locally for offline viewing.</p>
        <div class="import-actions">
          <button id="fetch-btn" class="fetch-btn import-btn" type="button">Fetch Games</button>
          <button id="import-btn" class="import-btn" type="button">Import Games</button>
        </div>
        <input id="games-import-file" type="file" accept="application/json" hidden>
        <p id="status" class="status-message" role="status" aria-live="polite"></p>
        <button id="export-btn" class="import-btn" type="button">Export Games</button>
      </section>

      <section class="games-section" aria-labelledby="games-heading">
        <div class="games-section-header">
          <div>
            <h3 id="games-heading">Owned Games</h3>
            <p id="games-summary" class="games-summary" aria-live="polite"></p>
          </div>
          <div class="games-controls" aria-label="Search and sort imported games">
            <label class="control-field" for="game-search">
              <span>Search</span>
              <input id="game-search" type="search" placeholder="Search by title" autocomplete="off">
            </label>
            <label class="control-field" for="game-filter">
              <span>Filter</span>
              <select id="game-filter">
                <option value="all">All games</option>
                <option value="unplayed">Never played</option>
                <option value="light">Light playtime</option>
                <option value="heavy">Heavy playtime</option>
              </select>
            </label>
            <label class="control-field" for="game-sort">
              <span>Sort by</span>
              <select id="game-sort">
                <option value="playtime-desc">Most played</option>
                <option value="playtime-asc">Least played</option>
                <option value="name-asc">Name A-Z</option>
                <option value="name-desc">Name Z-A</option>
              </select>
            </label>
          </div>
        </div>
        <div id="games-grid" class="games-grid" role="list"></div>
      </section>
      <button id="logout-btn" class="logout-btn" type="button">Exit</button>
    </section>
  </main>

  <footer class="site-footer">
    <nav class="footer-links" aria-label="Footer navigation">
      <a href="index.html">Login</a>
      <span class="divider" aria-hidden="true">|</span>
      <a href="about.html">About</a>
      <span class="divider" aria-hidden="true">|</span>
      <a href="mailto:contact@guiderail.com">Contact</a>
    </nav>
  </footer>

  <script src="scripts/profile.js"></script>
</body>
</html>
