<!DOCTYPE html>
<html>
<head>
  <title>Sign In</title>
  <link rel="stylesheet" href="styles/color.css">
  <link rel="icon" href="https://fav.farm/🚉">
  <!-- Reference for Page:--> <a href="images/login.png"></a>
</head>
<body>
    <div class="login-box">
        <p class="window-title">GuideRail Login</p>
        <form action="action_page.php" method="post">
            <div class="input-group">
                <label for="username">Account name</label>
                <input type="text" required oninvalid="event.preventDefault();" name="username" id="username">
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
