<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GuideRail - Sign In</title>
    <link rel="stylesheet" href="styles/color.css">
    <link rel="icon" href="https://fav.farm/🚉" aria-hidden="true">
    <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">
</head>

<body class="login-page">
    <header class="site-header">
        <button id="theme-toggle" type="button">Toggle Theme</button>
        <h1 class="site-title"><span aria-hidden="true">🚉</span> GuideRail</h1>
        <nav class="site-nav" aria-label="Main navigation">
            <a href="index.html" aria-current="page">Home</a>
            <a href="profile.html">Profile</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="site-main" id="main-content">
        <section class="error-container" aria-labelledby="login-error-heading">
            <h2 id="login-error-heading" class="sr-only">Login errors</h2>
            <div id="login-error" class="login-error" role="alert" aria-atomic="true" tabindex="-1" hidden></div>
        </section>

        <section class="auth-stack" aria-labelledby="login-heading">
            <article class="login-box">
                <h2 id="login-heading" class="window-title">GuideRail Login</h2>
                <form novalidate>
                    <div class="input-group">
                        <label for="api-key">Steam API Key</label>
                        <input type="text" aria-required="true" aria-describedby="api-key-help" name="api-key"
                            id="api-key" autocomplete="off" spellcheck="false">
                        <span id="api-key-help" class="sr-only">Enter your Steam Web API key. This key is stored only in
                            your browser.</span>
                    </div>
                    <div class="input-group">
                        <label for="username">Steam URL/ID</label>
                        <input type="text" aria-required="true" aria-describedby="username-help" name="username"
                            id="username">
                        <span id="username-help" class="sr-only">Enter your Steam username or profile URL</span>
                    </div>
                    <button type="submit">Login</button>
                </form>
            </article>

            <section class="loading-panel" id="login-loading" aria-live="polite" aria-atomic="true" hidden>
                <h3 class="loading-title">Loading...</h3>
                <p class="loading-status" id="statusText">Verifying and downloading resources...</p>
                <div class="loading-track" role="progressbar" aria-label="Login progress" aria-valuemin="0"
                    aria-valuemax="100" aria-valuenow="0">
                    <div id="barsContainer" class="loading-bars"></div>
                </div>
                <p class="loading-percent" id="percentText">0% complete</p>
            </section>
        </section>
    </main>

    <footer class="site-footer">
        <nav class="footer-links" aria-label="Footer navigation">
            <a href="about.html">About</a>
            <span class="divider" aria-hidden="true">|</span>
            <a href="mailto:contact@guiderail.com">Contact</a>
        </nav>
    </footer>
    
    <script src="scripts/login.js"></script>
</body>

</html>
