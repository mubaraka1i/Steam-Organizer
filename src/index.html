<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GuideRail - Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles/color.css">
    <link rel="icon" href="https://fav.farm/🚉" aria-hidden="true">
    <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">
</head>

<body class="login-page">
    <header class="site-header">
        <h1 class="site-title"><span aria-hidden="true">🚉</span> GuideRail</h1>
        <button id="theme-toggle" type="button">Toggle Theme</button>
        <nav class="site-nav" aria-label="Main navigation">
            <a href="index.html" aria-current="page">Home</a>
            <a href="profile.html">Profile</a>
            <a href="settings.html">Settings</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="site-main" id="main-content">
        <section class="error-container" aria-labelledby="fetch-error-heading">
            <h2 id="fetch-error-heading" class="sr-only">Fetch errors</h2>
            <div id="login-error" class="login-error" role="alert" aria-atomic="true" tabindex="-1" hidden></div>
        </section>

        <section class="auth-stack" aria-labelledby="fetch-heading">
            <article class="login-box">
                <h2 id="fetch-heading" class="window-title">Fetch Account</h2>
                <form novalidate>
                    <div class="input-group">
                        <label for="username">Steam URL/ID</label>
                        <input type="text" aria-required="true" aria-describedby="username-help" name="username"
                            id="username">
                        <span id="username-help" class="sr-only">Enter your Steam username or profile URL</span>
                    </div>
                    <button type="submit">Fetch</button>
                </form>
            </article>

            <article class="accounts-box">
                <h2 class="window-title">Saved Accounts</h2>
                <div class="accounts-controls">
                    <button id="accounts-export-btn" type="button" title="Export accounts to JSON">Export</button>
                    <button id="accounts-import-btn" type="button" title="Import accounts from JSON">Import</button>
                    <button id="accounts-filter-toggle" type="button" aria-pressed="false">Show Favorites</button>
                    <input type="file" id="accounts-import-file" accept=".json" style="display: none;" aria-hidden="true">
                </div>
                <div id="accounts-import-preview" class="import-preview" hidden aria-live="polite">
                    <p class="import-preview-title">Import preview</p>
                    <p id="accounts-import-preview-summary" class="import-preview-summary"></p>
                    <p id="accounts-import-preview-sample" class="import-preview-sample"></p>
                    <div class="import-preview-actions">
                        <button id="accounts-import-confirm-btn" type="button" class="import-btn">Import</button>
                        <button id="accounts-import-cancel-btn" type="button" class="import-btn">Cancel</button>
                    </div>
                </div>
                <ul id="accountsList" class="accounts-list" aria-live="polite"></ul>
            </article>

            <section class="loading-panel" id="login-loading" aria-live="polite" aria-atomic="true" hidden>
                <h3 class="loading-title">Loading...</h3>
                <p class="loading-status" id="statusText">Verifying and downloading resources...</p>
                <div class="loading-track" role="progressbar" aria-label="Login progress" aria-valuemin="0"
                    aria-valuemax="100" aria-valuenow="0">
                    <div id="barsContainer" class="loading-bars"></div>
                </div>
                <p class="loading-percent" id="percentText">0% complete</p>
            </section>
        </section>
    </main>

    <footer class="site-footer">
        <nav class="footer-links" aria-label="Footer navigation">
            <a href="about.html">About</a>
            <span class="divider" aria-hidden="true">|</span>
            <a href="mailto:appletmh@dukes.jmu.edu">Contact</a>
        </nav>
    </footer>
    
    <script src="scripts/login.js"></script>
</body>

</html>
